<!DOCTYPE html>
<html>
<head>
  <title>Solana Alpha Finder PRO (Stable)</title>
  <style>
    body { font-family: Arial; background:#0b0f1a; color:#fff; padding:20px; }
    button { padding:10px; margin:5px; }
    .card { background:#111827; padding:15px; margin-top:10px; border-radius:10px; }
    .green { color:#00ff9f; }
    .red { color:#ff4d4d; }
  </style>
</head>
<body>

<h2>🚀 SOLANA ALPHA FINDER (PRO STABLE)</h2>

<button onclick="start()">START</button>

<div id="summary" class="card"></div>
<div id="wallets"></div>

<script>

let demoBalance = 1000;
let walletStats = {};

let rpcList = [
  "https://api.mainnet-beta.solana.com",
  "https://rpc.ankr.com/solana",
  "https://solana.public-rpc.com"
];

let rpcIndex = 0;
let program = "JUP4Fb2cqiRUcaTHdrPC8h2gNsA2ETXiPDD33WcGuJB";

function getRPC() {
  return rpcList[rpcIndex];
}

function switchRPC() {
  rpcIndex = (rpcIndex + 1) % rpcList.length;
}

async function start() {
  document.getElementById("summary").innerHTML = "🔄 Starting scan...";
  await scan();
  setInterval(scan, 15000);
}

async function rpcCall(method, params, retries = 2) {
  try {
    let res = await fetch(getRPC(), {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        jsonrpc: "2.0",
        id: 1,
        method: method,
        params: params
      })
    });

    let data = await res.json();

    if (!data || data.error) throw new Error("RPC error");

    return data;

  } catch (e) {

    if (retries > 0) {
      switchRPC();
      await new Promise(r => setTimeout(r, 1000));
      return rpcCall(method, params, retries - 1);
    }

    throw e;
  }
}

async function scan() {

  try {

    let sigData = await rpcCall("getSignaturesForAddress", [program, {limit: 6}]);

    if (!sigData || !sigData.result || !Array.isArray(sigData.result)) {
      document.getElementById("summary").innerHTML = "⚠️ RPC busy... retrying";
      return;
    }

    let sigs = sigData.result;

    for (let s of sigs) {

      if (!s.signature) continue;

      let txData = await rpcCall("getTransaction", [s.signature, "jsonParsed"]);

      if (!txData || !txData.result) continue;

      let tx = txData.result;

      if (!tx.transaction || !tx.transaction.message) continue;

      let keys = tx.transaction.message.accountKeys;
      if (!keys || !keys[0]) continue;

      let wallet = keys[0].pubkey;

      if (!walletStats[wallet]) {
        walletStats[wallet] = { trades: 0, wins: 0, pnl: 0 };
      }

      walletStats[wallet].trades++;

      // stable simulated pnl
      let pnl = (Math.sin(Date.now()/100000 + wallet.length) * 10);

      walletStats[wallet].pnl += pnl;
      if (pnl > 0) walletStats[wallet].wins++;

      // demo copy trade
      let size = demoBalance * 0.05;
      demoBalance += size * (pnl / 100);
    }

    rank();

  } catch (e) {
    document.getElementById("summary").innerHTML = "⚠️ Error: " + e.message;
  }
}

function rank() {

  let ranked = [];

  for (let w in walletStats) {

    let d = walletStats[w];
    if (d.trades < 3) continue;

    let winrate = (d.wins / d.trades) * 100;
    let avg = d.pnl / d.trades;
    let score = (winrate * 0.6) + (avg * 0.4);

    ranked.push({
      wallet: w,
      trades: d.trades,
      winrate: winrate.toFixed(1),
      pnl: avg.toFixed(2),
      score: score.toFixed(1)
    });
  }

  ranked.sort((a,b)=>b.score-a.score);

  let html = "";

  ranked.slice(0,10).forEach(w => {

    let action = "WATCH";
    if (w.score > 50) action = "COPY";
    if (w.score < 20) action = "AVOID";

    html += `
      <div class="card">
        <b>${w.wallet.slice(0,6)}...${w.wallet.slice(-4)}</b><br/>
        Trades: ${w.trades}<br/>
        Winrate: <span class="${w.winrate>50?'green':'red'}">${w.winrate}%</span><br/>
        Avg PnL: <span class="${w.pnl>0?'green':'red'}">${w.pnl}%</span><br/>
        Score: ${w.score}<br/>
        Action: <b class="${action==='COPY'?'green':'red'}">${action}</b>
      </div>
    `;
  });

  document.getElementById("summary").innerHTML = `
    💰 Demo Balance: $${demoBalance.toFixed(2)}<br/>
    🔄 Auto scan every 15s<br/>
    ⚡ Multi-RPC active
  `;

  document.getElementById("wallets").innerHTML = html;
}

</script>

</body>
</html>
