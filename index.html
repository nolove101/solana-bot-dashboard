<!DOCTYPE html>
<html>
<head>
  <title>Solana Alpha Finder FREE</title>
  <style>
    body { font-family: Arial; background:#0b0f1a; color:#fff; padding:20px; }
    input, button { padding:10px; margin:5px; }
    .card { background:#111827; padding:15px; margin-top:10px; border-radius:10px; }
    .green { color:#00ff9f; }
    .red { color:#ff4d4d; }
  </style>
</head>
<body>

<h2>🚀 SOLANA ALPHA FINDER (FREE - NO API)</h2>

<button onclick="start()">START SCAN</button>

<div id="summary" class="card"></div>
<div id="wallets"></div>

<script>

let demoBalance = 1000;
let walletStats = {};
let rpc = "https://api.mainnet-beta.solana.com";

async function start() {
  document.getElementById("summary").innerHTML = "Scanning live network...";

  setInterval(scan, 20000);
  await scan();
}

async function scan() {

  // get recent signatures from Jupiter program (high activity)
  let program = "JUP4Fb2cqiRUcaTHdrPC8h2gNsA2ETXiPDD33WcGuJB";

  let res = await fetch(rpc, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      jsonrpc: "2.0",
      id: 1,
      method: "getSignaturesForAddress",
      params: [program, {limit: 20}]
    })
  });

  let data = await res.json();
  let sigs = data.result;

  for (let s of sigs) {

    let txRes = await fetch(rpc, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        jsonrpc: "2.0",
        id: 1,
        method: "getTransaction",
        params: [s.signature, "jsonParsed"]
      })
    });

    let txData = await txRes.json();
    let tx = txData.result;

    if (!tx) continue;

    let wallet = tx.transaction.message.accountKeys[0].pubkey;

    if (!walletStats[wallet]) {
      walletStats[wallet] = { trades: 0, wins: 0, pnl: 0 };
    }

    let instructions = tx.transaction.message.instructions;

    for (let ins of instructions) {

      if (!ins.parsed) continue;

      let token = ins.parsed.info?.mint;
      if (!token) continue;

      // get token price
      let priceRes = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${token}`);
      let priceData = await priceRes.json();

      let price = priceData.pairs?.[0]?.priceUsd;
      if (!price) continue;

      // simulate movement (light realistic drift)
      let future = price * (1 + (Math.random()*0.15 - 0.05));
      let pnl = ((future - price)/price)*100;

      walletStats[wallet].trades++;
      walletStats[wallet].pnl += pnl;
      if (pnl > 0) walletStats[wallet].wins++;

      // demo copy
      let size = demoBalance * 0.05;
      demoBalance += size * (pnl / 100);
    }
  }

  rank();
}

function rank() {

  let ranked = [];

  for (let w in walletStats) {

    let d = walletStats[w];
    if (d.trades < 5) continue;

    let winrate = (d.wins / d.trades) * 100;
    let avg = d.pnl / d.trades;

    let score = (winrate * 0.6) + (avg * 0.4);

    ranked.push({
      wallet: w,
      trades: d.trades,
      winrate: winrate.toFixed(1),
      pnl: avg.toFixed(2),
      score: score.toFixed(1)
    });
  }

  ranked.sort((a,b)=>b.score-a.score);

  let html = "";

  ranked.slice(0,10).forEach(w => {

    let action = "WATCH";
    if (w.score > 50) action = "COPY";
    if (w.score < 20) action = "AVOID";

    html += `
      <div class="card">
        Wallet: ${w.wallet}<br/>
        Trades: ${w.trades}<br/>
        Winrate: <span class="${w.winrate>50?'green':'red'}">${w.winrate}%</span><br/>
        Avg PnL: <span class="${w.pnl>0?'green':'red'}">${w.pnl}%</span><br/>
        Score: ${w.score}<br/>
        Action: <b class="${action==='COPY'?'green':'red'}">${action}</b>
      </div>
    `;
  });

  document.getElementById("summary").innerHTML = `
    💰 Demo Balance: $${demoBalance.toFixed(2)}<br/>
    🔄 Live scan every 20s<br/>
    ⚡ Source: Public Solana RPC
  `;

  document.getElementById("wallets").innerHTML = html;
}

</script>

</body>
</html>
