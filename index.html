<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SOL AUTO TRADER (FIXED)</title>
<style>
body { font-family: Arial; background:#0f172a; color:#e2e8f0; margin:0; }
.container { padding:20px; }
.card { background:#1e293b; padding:20px; border-radius:12px; margin-bottom:20px; }
table { width:100%; border-collapse: collapse; }
th, td { padding:10px; border-bottom:1px solid #334155; text-align:left; }
.badge { padding:4px 8px; border-radius:6px; }
.good { background:#16a34a; }
.mid { background:#eab308; }
.low { background:#ef4444; }
.new { background:#3b82f6; }
</style>
</head>
<body>
<div class="container">
<h1>🚀 SOL AUTO TRADER</h1>

<div class="card">
<h3>Mode</h3>
<button onclick="setMode('demo')">Demo</button>
<button onclick="setMode('real')">Real</button>
<p id="mode">Current: DEMO</p>
<p><b>Balance:</b> $<span id="balance">10000</span></p>
<button onclick="toggleBot()">Start / Stop Auto</button>
</div>

<div class="card">
<h3>Top Opportunities</h3>
<table>
<thead>
<tr>
<th>Token</th>
<th>Price</th>
<th>Liquidity</th>
<th>Volume</th>
<th>Change</th>
<th>Score</th>
<th>Tag</th>
</tr>
</thead>
<tbody id="opps"></tbody>
</table>
</div>

<div class="card">
<h3>Logs</h3>
<div id="logs" style="height:250px; overflow:auto;"></div>
</div>
</div>

<script>
let mode = 'demo';
let balance = 10000;
let running = false;

function setMode(m){
  mode = m;
  document.getElementById('mode').innerText = "Current: " + m.toUpperCase();
}

function toggleBot(){
  running = !running;
  log(running ? "AUTO BOT STARTED" : "AUTO BOT STOPPED");
}

function log(msg){
  const el = document.getElementById('logs');
  el.innerHTML += `<p>${new Date().toLocaleTimeString()} - ${msg}</p>`;
  el.scrollTop = el.scrollHeight;
}

function scoreToken(liq, vol, change){
  let score = 0;
  if(liq > 100000) score += 2;
  else if(liq > 50000) score += 1;

  if(vol > 100000) score += 2;
  else if(vol > 50000) score += 1;

  if(change > 20) score += 2;
  else if(change > 10) score += 1;

  return score;
}

function scoreBadge(score){
  if(score >=5) return '<span class="badge good">A</span>';
  if(score >=3) return '<span class="badge mid">B</span>';
  return '<span class="badge low">C</span>';
}

function autoTrade(token, price, score){
  if(!running) return;
  if(score < 4) return;

  let tradeSizeUSD = balance * 0.05;
  let qty = tradeSizeUSD / price;
  let win = Math.random() > 0.4;

  if(win){
    let sellPrice = price * (1.05 + Math.random()*0.05);
    let profit = (sellPrice - price) * qty;
    balance += profit;
    log(`BUY ${token} | ${qty.toFixed(4)} @ $${price.toFixed(6)}`);
    log(`SELL ${token} | ${qty.toFixed(4)} @ $${sellPrice.toFixed(6)} | +$${profit.toFixed(2)}`);
  } else {
    let sellPrice = price * (0.95 - Math.random()*0.03);
    let loss = (price - sellPrice) * qty;
    balance -= loss;
    log(`BUY ${token} | ${qty.toFixed(4)} @ $${price.toFixed(6)}`);
    log(`SELL ${token} | ${qty.toFixed(4)} @ $${sellPrice.toFixed(6)} | -$${loss.toFixed(2)}`);
  }

  document.getElementById('balance').innerText = balance.toFixed(2);
}

async function fetchData(){
  try{
    const res = await fetch("https://api.dexscreener.com/latest/dex/pairs/solana");
    const data = await res.json();

    let pairs = data.pairs || [];

    // remove SOL base + dedupe by token address
    let map = {};

    pairs.forEach(p => {
      if(p.baseToken.symbol === "SOL") return;

      const addr = p.baseToken.address;
      if(!map[addr]) map[addr] = p;
    });

    let unique = Object.values(map);

    let results = [];

    unique.forEach(p => {
      const liq = p.liquidity?.usd || 0;
      const vol = p.volume?.h24 || 0;
      const change = p.priceChange?.h24 || 0;

      if(liq > 30000 && vol > 20000){
        const score = scoreToken(liq, vol, change);

        let ageTag = '';
        if(p.pairCreatedAt){
          let ageMs = Date.now() - p.pairCreatedAt;
          if(ageMs < 2 * 60 * 60 * 1000){
            ageTag = '<span class="badge new">NEW</span>';
          }
        }

        results.push({p, liq, vol, change, score, ageTag});
      }
    });

    results.sort((a,b) => b.score - a.score);

    const tbody = document.getElementById('opps');
    tbody.innerHTML = '';

    results.slice(0,10).forEach(r => {
      const name = r.p.baseToken.name + " (" + r.p.baseToken.symbol + ")";

      const row = `
      <tr>
        <td>${name}</td>
        <td>$${parseFloat(r.p.priceUsd).toFixed(6)}</td>
        <td>$${r.liq.toFixed(0)}</td>
        <td>$${r.vol.toFixed(0)}</td>
        <td>${r.change.toFixed(2)}%</td>
        <td>${scoreBadge(r.score)}</td>
        <td>${r.ageTag}</td>
      </tr>`;

      tbody.innerHTML += row;

      autoTrade(name, r.p.priceUsd, r.score);
    });

    if(results.length === 0){
      tbody.innerHTML = "<tr><td colspan='7'>No opportunities</td></tr>";
    }

  }catch(e){
    console.log(e);
  }
}

setInterval(fetchData, 5000);
fetchData();
</script>
</body>
</html>
