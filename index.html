<!DOCTYPE html>
<html>
<head>
  <title>Solana Alpha Finder (Live)</title>
  <style>
    body { font-family: Arial; background:#0b0f1a; color:#fff; padding:20px; }
    button { padding:10px; margin:5px; }
    .card { background:#111827; padding:15px; margin-top:10px; border-radius:10px; }
    .green { color:#00ff9f; }
    .red { color:#ff4d4d; }
  </style>
</head>
<body>

<h2>🚀 SOLANA ALPHA FINDER (LIVE)</h2>

<button onclick="start()">START</button>

<div id="summary" class="card"></div>
<div id="wallets"></div>

<script>

let demoBalance = 1000;
let walletStats = {};

// public RPC (works on GitHub Pages)
let rpc = "https://api.mainnet-beta.solana.com";

// Jupiter = high activity trading program
let program = "JUP4Fb2cqiRUcaTHdrPC8h2gNsA2ETXiPDD33WcGuJB";

async function start() {
  document.getElementById("summary").innerHTML = "🔄 Starting scan...";
  await scan();

  setInterval(scan, 15000);
}

async function rpcCall(method, params) {
  let res = await fetch(rpc, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      jsonrpc: "2.0",
      id: 1,
      method: method,
      params: params
    })
  });
  return res.json();
}

async function scan() {

  try {

    let sigData = await rpcCall("getSignaturesForAddress", [program, {limit: 8}]);
    let sigs = sigData.result;

    for (let s of sigs) {

      let txData = await rpcCall("getTransaction", [s.signature, "jsonParsed"]);
      let tx = txData.result;

      if (!tx) continue;

      let wallet = tx.transaction.message.accountKeys[0].pubkey;

      if (!walletStats[wallet]) {
        walletStats[wallet] = { trades: 0, wins: 0, pnl: 0 };
      }

      walletStats[wallet].trades++;

      // stable simulated PnL (not random spikes)
      let pnl = (Math.sin(Date.now()/100000 + wallet.length) * 10);

      walletStats[wallet].pnl += pnl;
      if (pnl > 0) walletStats[wallet].wins++;

      // demo copy
      let size = demoBalance * 0.05;
      demoBalance += size * (pnl / 100);
    }

    rank();

  } catch (e) {
    document.getElementById("summary").innerHTML = "⚠️ Error: " + e.message;
  }
}

function rank() {

  let ranked = [];

  for (let w in walletStats) {

    let d = walletStats[w];
    if (d.trades < 3) continue;

    let winrate = (d.wins / d.trades) * 100;
    let avg = d.pnl / d.trades;
    let score = (winrate * 0.6) + (avg * 0.4);

    ranked.push({
      wallet: w,
      trades: d.trades,
      winrate: winrate.toFixed(1),
      pnl: avg.toFixed(2),
      score: score.toFixed(1)
    });
  }

  ranked.sort((a,b)=>b.score-a.score);

  let html = "";

  ranked.slice(0,10).forEach(w => {

    let action = "WATCH";
    if (w.score > 50) action = "COPY";
    if (w.score < 20) action = "AVOID";

    html += `
      <div class="card">
        <b>${w.wallet.slice(0,6)}...${w.wallet.slice(-4)}</b><br/>
        Trades: ${w.trades}<br/>
        Winrate: <span class="${w.winrate>50?'green':'red'}">${w.winrate}%</span><br/>
        Avg PnL: <span class="${w.pnl>0?'green':'red'}">${w.pnl}%</span><br/>
        Score: ${w.score}<br/>
        Action: <b class="${action==='COPY'?'green':'red'}">${action}</b>
      </div>
    `;
  });

  document.getElementById("summary").innerHTML = `
    💰 Demo Balance: $${demoBalance.toFixed(2)}<br/>
    🔄 Auto updating every 15s<br/>
    ⚡ Live Solana activity
  `;

  document.getElementById("wallets").innerHTML = html;
}

</script>

</body>
</html>
